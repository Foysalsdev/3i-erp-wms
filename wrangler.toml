name = "whirlpool-wh"
compatibility_date = "2024-01-01"
pages_build_output_dir = "dist"

# `_redirects` with `/* /index.html 200` is silently disabled by Cloudflare
# Pages' build-time "infinite loop" detector (a known false positive: it flags
# the rule because /index.html itself also matches the /* pattern). This is
# the supported replacement — served directly by the platform, not a redirect
# rule, so it isn't subject to that check.
[assets]
not_found_handling = "single-page-application"
